<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContextGraph World</title>
  <link rel="stylesheet" href="/world/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="game-container"></div>

  <div id="inspect-panel" class="inspect-panel hidden"></div>

  <div id="js-error-overlay" style="display:none;position:fixed;top:12px;left:12px;right:12px;max-height:40vh;overflow:auto;background:rgba(127,29,29,0.92);color:#fff;font:12px/1.4 ui-monospace,Menlo,monospace;padding:12px 16px;border-radius:6px;z-index:99999;white-space:pre-wrap;border:2px solid #fecaca;"></div>
  <script>
    (function(){
      var box = document.getElementById('js-error-overlay');
      function show(line) {
        box.style.display = 'block';
        var d = document.createElement('div');
        d.textContent = line;
        box.appendChild(d);
      }
      window.addEventListener('error', function(e){
        var msg = (e.message || 'error') + '  @  ' + (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?');
        if (e.error && e.error.stack) msg += '\n' + e.error.stack;
        show('[JS ERROR] ' + msg);
      });
      window.addEventListener('unhandledrejection', function(e){
        var r = e.reason;
        var msg = (r && r.message) ? r.message : String(r);
        if (r && r.stack) msg += '\n' + r.stack;
        show('[PROMISE REJECT] ' + msg);
      });
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="/world/static/game/main.js"></script>
</body>
</html>
